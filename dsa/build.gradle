plugins {
    id 'java'
}

group = 'edu.self.dsa'
version = '1.0-SNAPSHOT'
sourceCompatibility = '25'
targetCompatibility = '25'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}